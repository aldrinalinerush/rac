  all CSS, JS and icons live in this one file so it renders

  User data is stored locally in the browser (localStorage),
  so every visitor automatically gets their own private copy.

<style>
  /* ----------------------------------------------------------------
     STYLE INDEX
      1. Theme variables (dark / light)      7. Saved view & drag-and-drop
      2. Base, header & brand                8. Toast & undo snackbar
      3. Quick bars (chips)                  9. Modal dialogs & emoji grid
      4. Layout: sidebar / resizer          10. Credit line & About
      5. Cards, tags, actions               11. Scrollbars
      6. Inline editor                      12. Responsive & touch
     ---------------------------------------------------------------- */
  :root{
    --bg:#0f1419; --panel:#1a2029; --panel2:#222b36; --line:#2c3744;
    --text:#eef2f6; --dim:#9aa7b4; --accent:#635bff; --accent2:#5148e0; --pill:#26303b; --star:#f5c451;
    --t-pos:#2ec27e; --t-neg:#f0616d; --t-warn:#efa53c; --t-info:#4a90ff; --t-neutral:#8b93a7;
    --mark:rgba(245,196,81,.30);
  }
  html[data-theme="light"]{
    --bg:#f5f6fa; --panel:#ffffff; --panel2:#eef1f6; --line:#e2e6ee; --text:#1a1f36; --dim:#6b7385; --pill:#e9edf5; --star:#c9911a;
    --t-pos:#12a15f; --t-neg:#d83c48; --t-warn:#c67f16; --t-info:#2e7be6; --t-neutral:#8a92a4;
    --mark:rgba(201,145,26,.22);
  }
  *{box-sizing:border-box}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); height:100vh; overflow:hidden; display:flex; flex-direction:column;}
  header{display:flex; align-items:center; gap:12px; padding:9px 16px; background:var(--panel); border-bottom:1px solid var(--line); flex:0 0 auto;}
  .brand{display:inline-flex; align-items:center; gap:9px; white-space:nowrap; cursor:pointer; user-select:none}
  .brand .logo{width:27px; height:27px; flex:0 0 auto; display:block}
  .brandtext{display:inline-flex; align-items:baseline; gap:6px; font-weight:800; font-size:17px; letter-spacing:.5px}
  .brandtext span{color:var(--dim); font-weight:500; font-size:12px}
  .brand:hover .brandtext span{color:var(--accent)}
  #search{flex:1; background:var(--panel2); border:1px solid var(--line); color:var(--text); padding:11px 14px; border-radius:10px; font-size:16px; outline:none;}
  #search:focus{border-color:var(--accent)}
  .tbtn{background:var(--panel2); border:1px solid var(--line); color:var(--text); padding:9px 12px; border-radius:9px; cursor:pointer; font-size:13px; white-space:nowrap;}
  .tbtn:hover{border-color:var(--accent)}

  .quick{display:flex; align-items:center; gap:10px; padding:8px 16px; background:var(--panel); border-bottom:1px solid var(--line); flex:0 0 auto;}
  .qtoggle{display:flex; flex:0 0 auto; background:var(--panel2); border:1px solid var(--line); border-radius:9px; overflow:hidden}
  .qtoggle button{background:transparent; border:none; color:var(--dim); padding:7px 12px; cursor:pointer; font-size:12.5px; font-weight:600; white-space:nowrap;}
  .qtoggle button.on{background:var(--accent); color:#fff}
  .chips{display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; scroll-behavior:smooth; scrollbar-width:none; -ms-overflow-style:none}
  .chips::-webkit-scrollbar{display:none; height:0; width:0}
  .chip{background:var(--panel2); border:1px solid var(--line); border-radius:20px; padding:8px 14px; font-size:14px; white-space:nowrap; cursor:pointer; color:var(--text); flex:0 0 auto;}
  .chip:hover{border-color:var(--accent)}

  main{display:flex; flex:1; min-height:0}
  nav{width:246px; flex:0 0 auto; background:var(--panel); border-right:1px solid var(--line); overflow-y:auto; padding:8px 8px 40px;}
  .resizer{width:6px; flex:0 0 auto; cursor:col-resize; position:relative; background:transparent; touch-action:none; z-index:5}
  .resizer::before{content:""; position:absolute; top:0; bottom:0; left:0; width:2px; background:transparent; transition:background .12s}
  .resizer:hover::before,.resizer.dragging::before{background:var(--accent)}
  .resizer::after{content:"⇔"; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:11px; line-height:1; color:#fff; background:var(--accent); border-radius:5px; padding:6px 3px; opacity:0; transition:opacity .12s; pointer-events:none; box-shadow:0 1px 5px rgba(0,0,0,.3)}
  .resizer:hover::after,.resizer.dragging::after{opacity:1}
  .navgroup{font-size:10.5px; letter-spacing:1px; text-transform:uppercase; color:var(--dim); padding:14px 12px 6px; font-weight:700;}
  .cat{display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:9px; cursor:pointer; font-size:13.5px; color:var(--dim); margin-bottom:1px; line-height:1.25; position:relative;}
  .cat:hover{background:var(--panel2); color:var(--text)}
  .cat.active{background:var(--panel2); color:var(--text); font-weight:600}
  .cat.active::before{content:""; position:absolute; left:-8px; width:3px; height:20px; background:var(--accent); border-radius:2px}
  .cat .em{font-size:16px; flex:0 0 auto; width:20px; text-align:center}
  .cat.dragging{opacity:.4}
  .addcat{color:var(--accent); font-size:12.5px; padding:9px 12px; cursor:pointer; opacity:.75; border-radius:9px; transition:background .12s, opacity .12s}
  .addcat:hover{opacity:1; background:var(--panel2)}

  .content{flex:1; overflow-y:auto; padding:18px 22px 90px}
  .chead{font-size:22px; font-weight:700; margin:0 0 2px; display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .catctrl{display:inline-flex; gap:6px; margin-left:4px; opacity:0; transition:opacity .12s}
  .chead:hover .catctrl{opacity:1}
  .minibtn{font-size:12px; background:var(--panel2); border:1px solid var(--line); color:var(--dim); border-radius:7px; padding:3px 8px; cursor:pointer}
  .minibtn:hover{border-color:var(--accent); color:var(--text)}
  .minibtn.danger:hover{border-color:var(--t-neg); color:var(--t-neg)}

  .subhead{font-size:12px; letter-spacing:.6px; text-transform:uppercase; font-weight:700; margin:22px 0 10px; display:flex; align-items:center; gap:9px; color:var(--tone,var(--dim));}
  .subhead .dot{width:9px; height:9px; border-radius:50%; background:var(--tone,var(--dim)); flex:0 0 auto}
  .subhead .sctrl{display:inline-flex; gap:6px; opacity:0; transition:opacity .12s}
  .subhead:hover .sctrl{opacity:1}

  .card{background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--tone,var(--line));
    border-radius:12px; padding:15px 18px; margin-bottom:10px; position:relative; min-height:76px;
    transition:border-color .12s, box-shadow .14s, transform .12s;}
  .card:hover{border-color:var(--accent2)}
  .card .line{font-size:18.5px; line-height:1.5; padding-right:36px}
  .card.given .line::after{content:" ✓ company spiel"; font-size:11px; color:var(--t-pos); white-space:nowrap; letter-spacing:.3px}
  .card .tag{display:inline-block; margin-top:10px; font-size:11px; letter-spacing:.4px; text-transform:uppercase; color:var(--dim); background:var(--pill); padding:3px 9px; border-radius:12px;}
  .card .crumb{font-size:11.5px; color:var(--accent); font-weight:600; margin-bottom:7px}
  .crumb.clickable{cursor:pointer; display:inline-block; padding:2px 7px; margin-left:-7px; border-radius:6px; transition:background .12s, color .12s}
  .crumb.clickable:hover{background:var(--panel2); color:var(--accent2)}
  .card mark{background:var(--mark); color:inherit; border-radius:3px; padding:0 1px}

  .star{position:absolute; top:12px; right:13px; font-size:19px; cursor:pointer; color:var(--line); user-select:none; line-height:1; transition:color .28s ease, transform .18s ease}
  .star.on{color:var(--star)} .star:hover{color:var(--star)}
  .actions{position:absolute; bottom:10px; right:12px; display:flex; gap:6px; opacity:0; transition:opacity .12s}
  .card:hover .actions{opacity:1}
  .act{font-size:12px; padding:4px 9px; border:1px solid var(--line); border-radius:8px; background:var(--panel2); cursor:pointer; color:var(--dim); white-space:nowrap}
  .act:hover{border-color:var(--accent); color:var(--text)}
  .act.copy{color:var(--accent); border-color:var(--accent)}
  .act.del:hover{border-color:var(--t-neg); color:var(--t-neg)}
  .act.go{color:var(--accent)}

  /* add affordances */
  .addline{display:inline-flex; align-items:center; gap:6px; color:var(--accent); cursor:pointer; font-size:13px; padding:4px 2px 10px; opacity:.75}
  .addline:hover{opacity:1}
  .addsub{color:var(--accent); cursor:pointer; font-size:13px; margin:8px 0 0; opacity:.75}
  .addsub:hover{opacity:1; text-decoration:underline}

  /* inline editor */
  .ed-text{width:100%; min-height:72px; background:var(--panel2); border:1px solid var(--accent); color:var(--text); border-radius:9px; padding:10px; font-size:16px; font-family:inherit; resize:vertical}
  .ed-tag{width:100%; margin-top:8px; background:var(--panel2); border:1px solid var(--line); color:var(--text); border-radius:8px; padding:8px 10px; font-size:13px}
  .ed-opts{display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-top:9px; font-size:13px; color:var(--dim)}
  .ed-opts label{display:flex; align-items:center; gap:6px}
  .ed-opts select{background:var(--panel2); border:1px solid var(--line); color:var(--text); border-radius:7px; padding:5px 8px; font-size:13px}
  .ed-row{display:flex; gap:8px; margin-top:11px}
  .ed-save{background:var(--accent); color:#fff; border:none; border-radius:8px; padding:8px 16px; cursor:pointer; font-size:14px; font-weight:600}
  .ed-cancel{background:var(--panel2); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:8px 16px; cursor:pointer; font-size:14px}

  /* saved / drag */
  .card.sv{padding-left:36px; transition:opacity .22s ease, transform .22s ease, max-height .24s ease, margin .24s ease, padding .24s ease, border-color .12s, box-shadow .14s}
  .card.sv.removing{opacity:0; transform:translateX(16px); max-height:0!important; margin-top:0!important; margin-bottom:0!important; padding-top:0!important; padding-bottom:0!important; border-width:0!important; overflow:hidden}
  .grip{position:absolute; left:6px; top:0; bottom:0; width:22px; display:flex; align-items:center; justify-content:center; color:var(--dim); cursor:grab; font-size:15px; letter-spacing:-1px; border-radius:8px}
  .grip:hover{color:var(--text); background:var(--panel2)}
  .card.sv:active .grip, .grip:active{cursor:grabbing}
  .card.dragging{opacity:.4; transform:scale(.99)}
  .card.drop-above{box-shadow:inset 0 3px 0 0 var(--accent)}
  .card.drop-below{box-shadow:inset 0 -3px 0 0 var(--accent)}

  .savedbar{display:flex; align-items:center; gap:10px; margin:14px 0 18px}
  .empty{color:var(--dim); text-align:center; margin-top:60px; font-size:15px; line-height:1.7}
  .hint{background:var(--panel2); border:1px dashed var(--line); border-radius:10px; padding:10px 14px; font-size:13px; color:var(--dim); margin:6px 0 8px; line-height:1.5}
  .toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--accent); color:#fff; padding:8px 15px; border-radius:9px; font-size:13px; font-weight:600; opacity:0; pointer-events:none; transition:opacity .2s; z-index:9}
  .toast.show{opacity:1}

  .undobar{position:fixed; bottom:18px; left:18px; background:var(--panel); border:1px solid var(--line); color:var(--text); padding:6px 6px 6px 14px; border-radius:9px; font-size:13px; display:flex; align-items:center; gap:10px; box-shadow:0 6px 20px rgba(0,0,0,.28); opacity:0; transform:translateY(10px); pointer-events:none; transition:opacity .18s, transform .18s; z-index:120}
  .undobar.show{opacity:1; transform:translateY(0); pointer-events:auto}
  .undo-msg{white-space:nowrap}
  .undo-btn{background:var(--accent); color:#fff; border:none; border-radius:6px; padding:4px 11px; font-size:12px; font-weight:700; cursor:pointer}
  .undo-btn:hover{filter:brightness(1.08)}

  /* modal dialogs */
  .modal-overlay{position:fixed; inset:0; background:rgba(9,12,18,.55); backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; padding:20px; z-index:100; opacity:0; transition:opacity .16s ease;}
  html[data-theme="light"] .modal-overlay{background:rgba(20,26,40,.30)}
  .modal-overlay.show{opacity:1}
  .modal{width:100%; max-width:430px; background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:22px 22px 18px; box-shadow:0 24px 64px rgba(0,0,0,.45); transform:translateY(12px) scale(.975); transition:transform .18s cubic-bezier(.2,.85,.25,1);}
  .modal-overlay.show .modal{transform:none}
  .modal-title{font-size:17px; font-weight:700; margin-bottom:8px; letter-spacing:-.1px}
  .modal-msg{font-size:14px; color:var(--dim); line-height:1.55}
  .modal-input{width:100%; margin-top:12px; background:var(--panel2); border:1px solid var(--line); color:var(--text); border-radius:10px; padding:11px 13px; font-size:15px; outline:none;}
  .modal-input:focus{border-color:var(--accent)}
  .emoji-grid{display:grid; grid-template-columns:repeat(8,1fr); gap:6px; margin-top:14px; max-height:184px; overflow-y:auto; padding:2px}
  .emoji-btn{font-size:20px; line-height:1; padding:7px 0; border:1px solid transparent; border-radius:9px; background:var(--panel2); cursor:pointer; transition:background .1s, border-color .1s}
  .emoji-btn:hover{border-color:var(--accent); background:var(--panel)}
  .emoji-btn.sel{border-color:var(--accent); box-shadow:0 0 0 2px var(--accent) inset}
  .modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:22px}
  .modal-btn{padding:9px 18px; border-radius:9px; font-size:14px; font-weight:600; cursor:pointer; border:1px solid transparent; transition:filter .12s, background .12s}
  .btn-secondary{background:transparent; border-color:var(--line); color:var(--text)}
  .btn-secondary:hover{background:var(--panel2)}
  .btn-primary{background:var(--accent); color:#fff}
  .btn-primary:hover{filter:brightness(1.08)}
  .btn-danger{background:var(--t-neg); color:#fff}
  .btn-danger:hover{filter:brightness(1.06)}
  /* credit line & About modal */
  .credit{margin-top:18px; padding:10px 12px; font-size:11.5px; color:var(--dim); cursor:pointer; border-radius:9px; transition:background .12s, color .12s; user-select:none}
  .credit:hover{background:var(--panel2); color:var(--text)}
  .about-rows{margin-top:6px; font-size:14px; color:var(--dim); line-height:2}
  .about-rows a{color:inherit; text-decoration:none; word-break:break-all}
  .about-rows a:hover{color:var(--accent); text-decoration:underline}

  nav::-webkit-scrollbar,.content::-webkit-scrollbar{height:9px;width:9px}
  nav::-webkit-scrollbar-thumb,.content::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}

  /* responsive & touch hardening */
  @media(max-width:720px){nav{width:158px!important} .resizer{display:none} .cat{font-size:12.5px; padding:8px} .card .line{font-size:16.5px} .brandtext span{display:none} .bl{display:none}}
  @media(max-width:560px){
    header{flex-wrap:wrap; gap:8px}
    #search{order:5; flex:1 1 100%; min-width:0}
    .qtoggle button{padding:7px 9px; font-size:12px}
  }
  @media(max-width:480px){nav{width:132px!important} .content{padding:14px 14px 90px} .card .line{font-size:15.5px} .modal{max-width:none}}
  @media(pointer:coarse){
    /* touch devices have no hover — keep actions permanently visible & finger-sized */
    .actions,.catctrl,.subhead .sctrl{opacity:1}
    .act{padding:8px 12px; font-size:13px}
    .star{font-size:22px}
    .chip{padding:10px 16px}
    .grip{width:28px}
  }
</style>
</head>
<body>
<header>
  <div class="brand" title="Home — go to Reaching Them">
    <svg class="logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><defs><linearGradient id="rlg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7A72FF"/><stop offset="1" stop-color="#4B3FDE"/></linearGradient></defs><rect x="2" y="2" width="60" height="60" rx="15" fill="url(#rlg)"/><path d="M21 15 H43 a9 9 0 0 1 9 9 V32 a9 9 0 0 1 -9 9 H30 l-8 8 v-8 h-1 a9 9 0 0 1 -9 -9 V24 a9 9 0 0 1 9 -9 Z" fill="#fff"/><path d="M34 19 L25 30 h6.5 l-2.5 9 11 -13 h-6.5 z" fill="url(#rlg)"/></svg>
    <span class="brandtext">RAC<span>· Rapid Assist Console</span></span>
  </div>
  <input id="search" placeholder="Search anything… angry, verify, voicemail, hold two, ticket" autocomplete="off" aria-label="Search all spiels">
  <button class="tbtn" id="favBtn" aria-label="Saved lines">★ Saved</button>
  <button class="tbtn" id="exportBtn" aria-label="Export backup" title="Download a backup file of all your data">⤓ <span class="bl">Export</span></button>
  <button class="tbtn" id="importBtn" aria-label="Import backup" title="Restore your data from a backup file">⤒ <span class="bl">Import</span></button>
  <button class="tbtn" id="themeBtn" aria-label="Toggle dark or light theme">☾</button>
</header>

<div class="quick">
  <div class="qtoggle">
    <button data-mode="buy" class="on">⏳ Buying time</button>
    <button data-mode="else">✓ Anything else?</button>
  </div>
  <div class="chips" id="chips"></div>
</div>

<main>
  <nav id="nav"></nav>
  <div class="resizer" id="resizer" title="Drag to resize the sidebar"></div>
  <section class="content" id="content"></section>
</main>
<div class="toast" id="toast"></div>

<script>
/* ==================================================================
   RAC — Rapid Assist Console · application script
   Author: John Aldrine Ilao <johnaldrineilao@gmail.com>
   LinkedIn: https://www.linkedin.com/in/johnaldrineilao/

   ARCHITECTURE (in file order — read top to bottom):
     1. CONFIG    — version, author, storage abstraction (with fallback)
     2. DATA      — GROUPS + SEED: the entire spiel library (edit content here)
     3. STORE     — model, persistence, migrations, line index
     4. HELPERS   — h() element builder, toast, undo snackbar, modal dialogs
     5. FEATURES  — quick bars, nav, CRUD, drag-and-drop, tone colors
     6. VIEWS     — render / renderNav / renderSearch / renderSaved
     7. BACKUP    — export / import + About dialog
     8. CONTROLS  — header buttons, theme, keyboard, sidebar resize
     9. INIT      — boot sequence (last line)

   DATA MODEL (persisted as JSON under localStorage key "rac_v5"):
     { v, uid, theme, quickMode, navWidth, current, fav, mig:[],
       cats:[{ id, emoji, group, title,
               subs:[{ id, title, tone, lines:[{ id, text, tag, given }] }] }],
       saved:[lineId, …] }
   ================================================================== */

/* ============================================================ 1. CONFIG ============================================================ */
const APP_VERSION="1.0.0";
const AUTHOR={name:"John Aldrine Ilao",email:"johnaldrineilao@gmail.com",linkedin:"https://www.linkedin.com/in/johnaldrineilao/"};
/**
 * Storage abstraction. Uses localStorage when available; falls back to a
 * silent in-memory store (e.g. strict private browsing) so the app never crashes.
 */
const storage=(function(){
  try{const t="__rac_probe__";localStorage.setItem(t,"1");localStorage.removeItem(t);return localStorage;}
  catch(e){const mem={};return{_mem:true,getItem:k=>(k in mem?mem[k]:null),setItem:(k,v)=>{mem[k]=String(v);},removeItem:k=>{delete mem[k];}};}
})();

/* ============================================================ 2. DATA ============================================================
   The complete spiel library. Human, natural, Stripe-branded.
   Sub tone: pos | neg | warn | info | neutral  (drives semantic color)
   [square brackets] = a quick detail you say live.
   To edit content: change text here, or use the in-app editor (hover a card).
   ============================================================ */
const GROUPS=[["A","The call, in order"],["B","When it comes up"]];
const SEED=[
{id:"reach",group:"A",emoji:"📞",title:"Reaching Them",subs:[
  ["Connected in one go",[
    ["Hi, is this [name]? Great to reach you — this is Aldrine from Stripe. Is now an okay time to talk for a few minutes?","instant"],
    ["Hi [name], this is Aldrine calling from Stripe. Do you have a few minutes for me?","instant"]],"pos"],
  ["Finally reached after a few tries",[
    ["Hi [name], I'm so glad we finally connected — I know I've tried you a couple of times, so thank you for picking up. I'll be quick and respectful of your time.","after tries"],
    ["Hi [name], it's Aldrine from Stripe. I've been hoping to catch you — thanks so much for taking my call now.","after tries"]],"pos"],
  ["First try went to voicemail, now connected",[
    ["Hi [name], it's Aldrine from Stripe. I left you a quick voicemail a little earlier, so thank you for taking my call now. Is this a good moment to talk?","after vm"],
    ["Hi [name], Aldrine here from Stripe — we may have just missed each other, I left a short message. Are you free to chat for a few minutes?","after vm"]],"info"],
  ["Confirming it's the right person",[
    ["Before I share any account details, can I just confirm I'm speaking with [name]? I want to be sure I've reached the right person.","confirm"]],"info"],
  ["Not a good time",[
    ["No problem at all, I completely understand you're busy. When would be a better time for me to call you back? I'll make a note and reach out then.","reschedule"]],"warn"],
  ["Wrong number",[
    ["Apologies for the interruption — it sounds like I may have the wrong number. I won't take up any more of your time. Thank you, and have a good day.","wrong number"]],"neg"],
  ["Poor line",[
    ["I'm so sorry, the line sounds a little unclear on my end and I want to catch everything you say — would you mind if I called you straight back to get a cleaner connection?","bad line"]],"warn"]
]},
{id:"vm",group:"A",emoji:"📭",title:"Voicemail",subs:[
  ["First attempt",[
    ["Hi, you've reached the voicemail — this is Aldrine calling from Stripe about your account. Nothing to worry about, I'd just like to go over a couple of details with you. I'll try you again shortly, or you can reach us back through the support number in your Stripe dashboard. Thanks, and have a great day.","1st"]],"info"],
  ["Follow-up attempt",[
    ["Hi [name], it's Aldrine from Stripe's Risk team again. I'd really like to connect with you about your account — when you have a moment, please call us back through your Stripe dashboard and mention my name. Thank you so much.","follow-up"]],"info"],
  ["Final attempt",[
    ["Hi [name], it's Aldrine from Stripe. This is the last time I'll be reaching out by phone about this, so it's important that we speak. Please do call us back at your earliest convenience through your Stripe dashboard. Thank you.","final"]],"warn"],
  ["Short and simple",[
    ["Hi [name], this is Aldrine from Stripe — please give us a call back through your dashboard whenever you get a chance. Thanks, and take care.","short"]],"neutral"]
]},
{id:"open",group:"A",emoji:"👋",title:"Opening",subs:[
  ["Greeting",[
    ["Hi, this is Aldrine and I'm calling from Stripe. Is this the best time to speak with you?","greeting"],
    ["Hi there, this is Aldrine over at Stripe. Do you have a few minutes to chat, or have I caught you at a busy moment?","greeting"]],"pos"],
  ["State the purpose",[
    ["The reason for my call today is [reason] — I'll keep this as clear and quick as I can for you.","purpose"]],"info"],
  ["Not a good time",[
    ["Totally understandable — I don't want to catch you at a bad moment. When works better and I'll call you right back then?","reschedule"]],"warn"]
]},
{id:"consent",group:"A",emoji:"🎙️",title:"Consent (Recording)",subs:[
  ["Ask for consent",[
    ["Before we proceed, do you allow us to record the call for training and quality purposes?","ask",true]],"info"],
  ["If they agree",[
    ["Thank you for allowing us to record the call. The recording will be processed in accordance with Stripe's privacy policy, which is also published on our website.","yes",true]],"pos"],
  ["If they decline",[
    ["That's completely fine — we'll now proceed without the recording.","no",true]],"neg"],
  ["If they hesitate",[
    ["Of course, it's entirely your choice. The recording only helps us keep quality high, but we're glad to continue either way.","hesitant"]],"warn"]
]},
{id:"who",group:"A",emoji:"🪪",title:"Who Am I Speaking With",subs:[
  ["Ask their name",[
    ["Before we dive in, may I ask who I have the pleasure of speaking with today? I'd love to address you properly.","ask name"],
    ["And just so I look after you correctly — how would you like me to address you?","ask name"]],"info"],
  ["Got the name",[
    ["Thank you, [name] — it's lovely to speak with you.","got name"]],"pos"],
  ["Not the rep on file",[
    ["Thank you for that. The name I have listed on the account looks a little different — may I ask how you're connected to the business? I just want to be sure I'm speaking with the right person.","not the rep"]],"warn"],
  ["Only the rep can proceed",[
    ["For an account matter like this, I'm only able to go into the details with the Company Representative on file — it's a security measure to protect the business. Is that person available, or could you help me reach them?","must be rep"]],"warn"]
]},
{id:"rep",group:"A",emoji:"🧩",title:"Explaining the Rep",subs:[
  ["Official definition",[
    ["Let me explain the difference: the Owner or Administrator is the main user on the account with 'owner' privileges, while the Company Representative is the person nominated to act as the primary contact and representative for the Stripe account.","official",true]],"info"],
  ["Simple version",[
    ["In plain terms — the Company Representative is simply the person the business officially named as its main point of contact with Stripe. It's usually whoever set the account up or handles the finances.","simple"]],"info"],
  ["Analogy",[
    ["Think of the Company Representative as the business's designated spokesperson for the account — the one person Stripe recognises to discuss the details and make decisions.","analogy"]],"info"],
  ["If they don't know who it is",[
    ["No problem at all, it's an easy detail to lose track of. You'll usually find the Company Representative listed in your Stripe dashboard under your business settings — whoever that is would be the best person for us to speak with.","don't know"]],"neutral"],
  ["If they push back",[
    ["I completely understand, and I can hear you're trying to help — I really appreciate that. This isn't about doubting you at all; it's a rule we apply to every single account so no one's business information is ever shared with the wrong person. I'm sure you'd want that same protection for your own business.","pushback"]],"warn"],
  ["Offer a path forward",[
    ["Here's what I can do: if the Company Representative can reach out to us, or add you as an authorised user on the account, I'll be able to help you fully. Would that work for you?","path"]],"pos"]
]},
{id:"verify",group:"A",emoji:"✅",title:"Verifying the Rep",subs:[
  ["Start verification",[
    ["Perfect, thank you for confirming. I'll just run a couple of quick security questions to verify — purely to protect the account — and then we'll get straight into it.","start"]],"info"],
  ["Reassure why we verify",[
    ["I know these questions can feel repetitive, and I appreciate you bearing with me. It's simply the best way I can keep your account safe.","reassure"]],"info"],
  ["If they hesitate to verify",[
    ["I completely understand the caution — you can never be too careful. These details only confirm I'm speaking with the right person, and then we can move forward.","hesitant"]],"warn"],
  ["Verified successfully",[
    ["Thank you, that all checks out. You're fully verified, so now I can go ahead and help you properly.","verified"]],"pos"]
]},
{id:"acctemail",group:"A",emoji:"📧",title:"Their Stripe Email",subs:[
  ["Ask for the email",[
    ["To pull up the right account, may I have the email address associated with your Stripe account?","ask"]],"info"],
  ["The account in question",[
    ["And just to be sure I'm looking at the correct one — is that the email tied to the account we're discussing today?","in question"]],"info"],
  ["Read it back",[
    ["Let me read that back to make sure I've got it exactly right: [email]. Is that correct?","confirm"]],"info"],
  ["If they have more than one",[
    ["No problem if you have a few accounts — which email is the one for the account in question today?","multiple"]],"neutral"]
]},
{id:"hear",group:"A",emoji:"🗣️",title:"Hearing Them Out",subs:[
  ["Invite them to explain",[
    ["So I can fully understand the situation, could you walk me through what's been happening? Take your time — I'm listening.","invite"],
    ["Tell me a little about what brought you to reach out today, and I'll make sure we get it sorted for you.","invite"]],"info"],
  ["Show you're listening",[
    ["Mm-hm, I'm with you… please, go on.","listening"],
    ["Please carry on, I don't want to interrupt — I'd rather hear the whole picture.","listening"]],"neutral"],
  ["Ask for more detail",[
    ["That's really helpful, thank you. And what happened after that?","more"]],"info"],
  ["Confirm you understood",[
    ["Okay, let me make sure I've got this right: [summary]. Have I understood you correctly?","confirm"]],"pos"]
]},
{id:"unclear",group:"A",emoji:"🔊",title:"Couldn't Catch That",subs:[
  ["Ask them to repeat (first time)",[
    ["I'm so sorry, could you say that once more for me? I want to make sure I get it exactly right.","repeat"],
    ["Apologies, I didn't quite catch that — would you mind repeating it?","repeat"],
    ["Sorry, could you run that by me one more time, please?","repeat"],
    ["I want to be sure I've got this right — could you say that again for me?","repeat"]],"info"],
  ["Ask again gracefully (2nd time+)",[
    ["Thank you for your patience — just once more so I can be certain I've got it perfectly.","again"],
    ["I really appreciate you bearing with me — could you repeat that last part one more time?","again"],
    ["Sorry to ask again — I just want to make absolutely sure I help you correctly. Could you say it once more?","again"],
    ["I don't want to get this wrong for you, so may I trouble you to repeat that just one more time?","again"]],"warn"],
  ["Repeat it back to confirm",[
    ["Let me repeat that back to make sure I've got it: [what you heard]. Is that right?","confirm"],
    ["So if I've understood correctly, you're saying [summary] — have I got that right?","confirm"],
    ["Just to confirm I heard you properly: [detail]. Did I catch that correctly?","confirm"],
    ["Let me make sure — you mentioned [detail], is that right?","confirm"]],"pos"],
  ["Noise on the customer's side",[
    ["There seems to be a bit of noise on the line — could you say that again for me?","their noise"],
    ["I think the line broke up for a second there — would you mind repeating that?","their noise"],
    ["Sorry, it sounded like the connection dipped — could you repeat that last bit?","their noise"],
    ["The line's a little noisy just now — just to be safe, could you say that once more?","their noise"]],"warn"],
  ["Noise on your side",[
    ["Apologies, it's a little noisy on my end — one moment… okay, could you say that again?","my noise"],
    ["Sorry about that, there was some noise here — would you mind repeating what you just said?","my noise"],
    ["Bear with me, it got a bit loud on my side — could you repeat that for me, please?","my noise"]],"warn"],
  ["Make sure they can hear you",[
    ["Am I coming through clearly for you? Just let me know if you'd like me to speak up.","clarity"],
    ["I want to make sure you can hear me okay — is the line clear on your end?","clarity"],
    ["Let me say that again for you, nice and clear: [repeat].","clarity"],
    ["If I'm ever going too fast, just tell me and I'll happily slow right down.","clarity"]],"info"],
  ["Slow the pace for both of you",[
    ["Let's take this nice and slow so we're both clear — there's no rush at all.","pace"],
    ["I'll go through this one step at a time so nothing gets missed.","pace"],
    ["Feel free to stop me anytime and I'll gladly repeat or explain — whatever's easiest for you.","pace"]],"neutral"]
]},
{id:"ack",group:"A",emoji:"👂",title:"Acknowledge",subs:[
  ["Acknowledge the point",[
    ["Thank you for explaining that so clearly — it genuinely helps me help you.","acknowledge"],
    ["I understand completely, and I appreciate you bringing this to my attention.","acknowledge"],
    ["That's an important detail, and I've made a note of it — thank you for raising it.","acknowledge"],
    ["You've explained that really well, and I have a clear picture now.","acknowledge"]],"pos"],
  ["Confirm you're acting on it",[
    ["I'm taking this seriously, and I'm looking into it for you right now.","acting"],
    ["Leave this with me — I'll make sure it's properly taken care of.","acting"]],"pos"]
]},
{id:"emp",group:"A",emoji:"💙",title:"Empathize",subs:[
  ["Acknowledge how they feel",[
    ["I can only imagine how concerning this must have been for you, and I'm truly sorry you've had to go through it.","feel"],
    ["That sounds genuinely stressful, and it's completely understandable that you'd feel this way.","feel"],
    ["I'm sorry this has caused you worry — that's the last thing we'd ever want for you.","feel"]],"info"],
  ["Reassure them",[
    ["Please know you're not dealing with this alone — I'm right here to help you through it.","reassure"],
    ["You did exactly the right thing by reaching out, and we'll take good care of this together.","reassure"],
    ["I want you to feel completely at ease by the end of this call, and I'll do everything I can to get you there.","reassure"]],"pos"]
]},
{id:"clarify",group:"A",emoji:"🔎",title:"Clarify",subs:[
  ["Check your understanding",[
    ["Just so I fully understand, could you tell me a little more about [detail]?","clarify"],
    ["Let me make sure I've got this right — [summary]. Is that accurate?","clarify"]],"info"],
  ["Confirm the goal",[
    ["So the outcome you're hoping for is [outcome] — is that the main priority for you today?","goal"]],"info"],
  ["Confirm a detail",[
    ["Before I take the next step, can I quickly confirm [detail] with you?","detail"]],"info"]
]},
{id:"wrap",group:"A",emoji:"🎯",title:"Wrap & Close",subs:[
  ["Anything else",[
    ["Before we wrap up, is there anything else at all I can help you with while I've got your account here?","anything else"]],"info"],
  ["Recap",[
    ["So just to recap what we've sorted today: [summary]. You're all set on that.","recap"]],"info"],
  ["Reassure it's handled",[
    ["There's nothing further you need to do — I've handled it all from my side. And if anything comes up, we're right here for you.","handled"]],"pos"],
  ["Warm close",[
    ["It's genuinely been a pleasure helping you today, [name].","close"],
    ["Thank you so much for your time today, [name]. Take care of yourself, and have a lovely rest of your day.","close"]],"pos"],
  ["Safety reminder",[
    ["Just a friendly reminder — Stripe will never ask for your password over the phone. Stay safe, and take care.","safety"]],"warn"]
]},

/* GROUP B */
{id:"buytime",group:"B",emoji:"⏳",title:"Buying Time",subs:[
  ["Stay on the line while you work",[
    ["Bear with me one moment — I'm pulling your account up right now.","stall"],
    ["Let me just check our latest notes on this, I've got it open here.","stall"],
    ["I'm reviewing everything on my screen now so I don't miss anything for you.","stall"],
    ["Give me a second to read through this properly — I want to tell you the right thing.","stall"],
    ["I'm cross-checking a couple of details so we get this right the first time.","stall"],
    ["Okay… I'm just navigating to that section now… and here we are.","stall"],
    ["Let me talk you through what I'm seeing as I go, so you're not left in silence.","stall"],
    ["I'm confirming this against our records now so I'm not guessing — one moment.","stall"],
    ["Still with you — I'm loading your history so we have the full picture.","stall"],
    ["I'm noting this all down as you speak so nothing gets lost, please carry on.","stall"]],"info"]
]},
{id:"guide",group:"B",emoji:"⏱️",title:"Guiding an Action / Check-in",subs:[
  ["Ask them to do something",[
    ["Whenever you're ready, could you go ahead and [action] for me? I'll stay right here with you.","ask"],
    ["Let's do this together — could you [action] on your end, and just let me know once you're there?","ask"]],"info"],
  ["Give them time / stay present",[
    ["No rush at all, take your time — I'm right here whenever you need me.","present"],
    ["I'll wait here with you, so just talk me through it as you go if that helps.","present"]],"neutral"],
  ["Check in politely (~2 min)",[
    ["How are you getting on there? Happy to help if you've hit anything tricky.","check-in"],
    ["Just checking in — are you able to see [screen] on your end, or shall I guide you to it?","check-in"],
    ["No pressure at all — how's it looking so far?","check-in"]],"info"],
  ["They're done",[
    ["Perfect, well done — that's exactly it. Let's move on to the next part.","done"]],"pos"],
  ["They need more time",[
    ["That's completely fine, take all the time you need. I'm not going anywhere.","more time"]],"neutral"]
]},
{id:"deesc",group:"B",emoji:"🧭",title:"De-escalation (step by step)",subs:[
  ["Step 1 · Acknowledge",[
    ["I can hear how upsetting this is, and I'm really sorry you're dealing with it.","acknowledge"],
    ["I can tell this has been frustrating, and you have every right to feel that way.","acknowledge"],
    ["I completely understand why you're upset, and I'm glad you're telling me.","acknowledge"]],"warn"],
  ["Step 2 · Empathize",[
    ["If this happened to me, I'd feel exactly the same way. You're right to be concerned.","empathize"],
    ["This would be stressful for anyone, and I don't blame you one bit.","empathize"],
    ["I really do understand where you're coming from, and I'm sorry you've been put through this.","empathize"]],"info"],
  ["Step 3 · Take ownership",[
    ["You've reached the right person now, and I'm going to stay with you until we have a plan.","ownership"],
    ["I'm going to personally see this through for you — you won't be passed around.","ownership"],
    ["Let me take this off your plate. From here, I'll handle it.","ownership"]],"info"],
  ["Step 4 · Set the boundary (if needed)",[
    ["I truly want to help — and I'll be able to do that fastest if we go one step at a time.","boundary"],
    ["I'm completely on your side, and I'll be most useful to you if we work through this calmly together.","boundary"],
    ["I hear you, and I promise I'm listening — let's take it one piece at a time so nothing gets missed.","boundary"]],"warn"],
  ["Step 5 · Offer the path",[
    ["Here's what I can do for you right now, and here's what happens next.","path"],
    ["Let me lay out exactly how we'll fix this, step by step.","path"],
    ["I've got a clear way forward for you — let me walk you through it.","path"]],"pos"],
  ["Step 6 · Confirm & reassure",[
    ["We've got a plan in place and your account is protected while we sort this. You're in good hands.","reassure"],
    ["You can rest easy now — this is being taken care of, and I'll make sure it's seen through.","reassure"],
    ["You've done everything right, and I'll take it from here. You're in good hands.","reassure"]],"pos"]
]},
{id:"cantshare",group:"B",emoji:"🔒",title:"Can't Share That",subs:[
  ["Core refusal",[
    ["I really wish I could share that, and I understand why you're asking. For your own protection, that's one detail I'm not able to give out over the phone.","refuse"]],"neg"],
  ["Frame as protection",[
    ["The reason we keep that private is the very same reason your account stays safe — if I gave it to anyone who asked, it wouldn't be secure.","protect"],
    ["I know it's not the answer you were hoping for, and I'm sorry. This rule exists purely to protect you.","protect"]],"info"],
  ["Pivot to a safe path",[
    ["I don't want to leave you stuck, though — let me show you the secure way to get what you need.","pivot"],
    ["What I can do is guide you to where you'll be able to see that safely once you're logged in. I'll stay on the line while you do.","pivot"]],"pos"],
  ["Handle pushback",[
    ["Please don't take this as me being unhelpful — it's actually me protecting you. I hold this same standard for every account, including my own.","pushback"]],"warn"]
]},
{id:"fraud",group:"B",emoji:"🛡️",title:"Fraud & Security",subs:[
  ["Flag the activity",[
    ["We spotted some activity that didn't quite match your usual pattern, and I wanted to check in with you before anything else happened. Nothing to panic about — we caught it early.","flag"]],"warn"],
  ["Review transactions",[
    ["Can I quickly run through a couple of recent transactions with you, and you just let me know if each one looks familiar?","review"]],"info"],
  ["Secure the account",[
    ["Since you don't recognise that one, the safest move is to secure the account right away. I'll take care of that and get everything protected for you.","secure"]],"warn"],
  ["Reassure funds",[
    ["Your funds are protected while we investigate, so please don't worry about being left out of pocket. That's exactly what we're here for.","funds"]],"pos"],
  ["Anti-phishing tip",[
    ["Just so you know, Stripe will never ask for your full password or a verification code — so if anyone ever does, that's your signal it isn't us.","phishing"]],"warn"],
  ["Reinforce good action",[
    ["You did absolutely the right thing flagging this. Catching it now is what keeps the impact to zero.","good action"]],"pos"]
]},
{id:"hold",group:"B",emoji:"⏸️",title:"Holding",subs:[
  ["Ask to hold",[
    ["Would you mind holding for two minutes while I look into this properly? I'll be as quick as I can.","ask"],
    ["Let me put you on a brief hold of about two minutes so I can review this — is that alright with you?","ask"],
    ["I'd like to check this thoroughly for you — may I place you on a short hold of around two minutes?","ask"],
    ["Give me just two minutes on hold to get this exactly right, and I'll be straight back with you. Is that okay?","ask"],
    ["To sort this properly I'll need about two minutes — do you mind a brief hold while I take care of it?","ask"]],"warn"],
  ["Return from hold",[
    ["Thank you so much for holding — I really appreciate your patience. Here's what I found.","return"],
    ["Thanks for waiting, I'm back with you now.","return"],
    ["Sorry to keep you — thank you for your patience. I've got an update for you.","return"],
    ["I'm back, and thank you for bearing with me. Good news, I've made some progress on this.","return"],
    ["Thanks so much for hanging on there. Let me bring you up to speed on what I've done.","return"]],"pos"]
]},
{id:"wait",group:"B",emoji:"⌛",title:"Waiting",subs:[
  ["Reassure while waiting",[
    ["I'm still here with you — just working through the details on my side. Won't be much longer.","reassure"],
    ["Bear with me, I'm almost there. Thank you for your patience.","reassure"],
    ["Just a few more moments and I'll have this for you — thanks for staying with me.","reassure"],
    ["I haven't forgotten you — I'm making sure everything's accurate before I come back to you.","reassure"],
    ["Nearly done here. I appreciate you giving me the time to get this right.","reassure"]],"info"],
  ["They're searching for something",[
    ["Take your time finding that — I'm in no rush at all.","searching"],
    ["No problem, I'll wait right here while you look for it.","searching"],
    ["Whenever you've found it, just let me know — there's no hurry on my end.","searching"],
    ["That's absolutely fine, have a look around and I'll be right here when you're ready.","searching"],
    ["No worries at all — take a moment, I'll hold on while you track it down.","searching"]],"neutral"]
]},
{id:"transfer",group:"B",emoji:"🔀",title:"Transfers",subs:[
  ["Warm transfer intro",[
    ["I want to get you to exactly the right person the first time, so I'm going to connect you to [team]. I'll introduce your case so you won't have to repeat everything.","intro"]],"info"],
  ["Prep the summary",[
    ["Before I connect you, let me quickly summarise what we've covered so it's a smooth handover for you.","summary"]],"info"],
  ["Reassure the handover",[
    ["You're in good hands — they'll have all the details before they come on, so nothing gets lost.","reassure"]],"pos"]
]},
{id:"case",group:"B",emoji:"🔢",title:"Case / Ticket Number",subs:[
  ["Provide the number",[
    ["I've logged this for you, and your reference number is [number]. I'd recommend jotting it down so you have it handy.","provide"]],"info"],
  ["They ask for it",[
    ["Of course — let me get that reference number for you now.","ask"]],"info"],
  ["Read it back / confirm",[
    ["Let me read that reference back to you slowly so you can note it down: [number]. Would you like me to repeat it?","confirm"]],"info"],
  ["Reassure it's on record",[
    ["Everything we've discussed today is saved under that reference, so if you call back, anyone can pick up right where we left off.","on record"]],"pos"]
]},
{id:"sup",group:"B",emoji:"🧑‍💼",title:"Supervisor Request",subs:[
  ["First response",[
    ["Of course, I completely understand, and you're absolutely entitled to that. Before I bring a supervisor in, may I take one shot at putting this right for you? I'd really like to help if I can.","first"]],"info"],
  ["They insist",[
    ["That's no problem at all. I'll arrange for my supervisor to speak with you — let me give them a quick summary first so you don't have to repeat everything.","insist"]],"info"],
  ["Not available now",[
    ["My supervisor isn't free this very moment, but I don't want to leave you waiting on hold. I can have them call you back within [timeframe], or I can email you — whichever you'd prefer.","not available"]],"warn"],
  ["Gather context",[
    ["So I can pass this on accurately, may I ask what you'd most like the supervisor to help with? I want them fully prepared for you.","context"]],"info"],
  ["Depersonalize",[
    ["Please don't worry — asking for a supervisor is completely normal and it doesn't offend me at all. My only goal is that you leave this call happy.","depersonalize"]],"pos"]
]},
{id:"email",group:"B",emoji:"✉️",title:"Move to Email",subs:[
  ["I suggest it",[
    ["This one has a few moving parts, and I'd hate for anything to get lost over the phone. Would it help if I put the details in an email so you have everything in writing, step by step?","complex"],
    ["There are a few stages to this and you won't be able to finish it all in one sitting. Let me send it by email so you can work through it at your own pace.","multi-step"]],"info"],
  ["You're short on time",[
    ["It sounds like you're a little pressed for time, and this needs a couple of steps on your side. Rather than rush you, how about I email you clear instructions to do whenever suits you?","short on time"]],"info"],
  ["Their technical issue",[
    ["Since that's happening on your device, it might be easier to follow written steps at your own pace. Let me email those over, and just reply to me directly if anything's unclear.","their tech"]],"warn"],
  ["Our technical issue",[
    ["I'm having a small technical issue on my side that's slowing us down, and I don't want to waste your time waiting. Let me follow up by email the moment it's sorted, with the full details.","our tech"]],"warn"],
  ["Need to investigate",[
    ["I'd rather give you a proper answer than a quick guess, so let me look into this further and email you the full details. You'll have it in writing and can reply anytime.","investigate"]],"info"],
  ["They requested it",[

const KEY="rac_v5";

function buildCat(c){return {id:c.id,emoji:c.emoji,group:c.group,title:c.title,
  subs:c.subs.map((s,si)=>({id:c.id+"_s"+si,title:s[0],tone:s[2]||"neutral",
    lines:s[1].map((l,li)=>({id:c.id+"_"+si+"_"+li,text:l[0],tag:l[1]||"",given:!!l[2]}))}))};}
function seedModel(){return {v:5,uid:1,theme:"dark",quickMode:"buy",cats:SEED.map(buildCat),saved:[]};}
let model=null;
/** Saves the whole model to storage. Never throws (quota/private-mode safe). */
function persist(m){try{storage.setItem(KEY,JSON.stringify(m||model));}catch(e){}}
function runMigrations(m){
  m.mig=m.mig||[];
  if(!m.mig.includes("unclear")){
    if(!m.cats.some(c=>c.id==="unclear")){const cat=buildCat(SEED.find(c=>c.id==="unclear"));const i=m.cats.findIndex(c=>c.id==="hear");if(i>=0)m.cats.splice(i+1,0,cat);else m.cats.push(cat);}
    m.mig.push("unclear");
  }
}
/** Loads the model from storage; corrupted or missing data falls back to a fresh seed. */
function loadModel(){let m=null;try{const x=JSON.parse(storage.getItem(KEY));if(x&&x.v===5)m=x;}catch(e){}if(!m)m=seedModel();runMigrations(m);persist(m);return m;}

/* ---------- DOM helper ---------- */
function h(t,a,...ch){const e=document.createElement(t);
  if(a)for(const k in a){
    if(k==="class")e.className=a[k];
    else if(k==="text")e.textContent=a[k];
    else if(k==="data"){for(const d in a[k])e.dataset[d]=a[k][d];}
    else if(k==="style")e.setAttribute("style",a[k]);
    else if(k==="html")e.innerHTML=a[k]; /* trusted static strings only — never user content */
    else if(k.slice(0,2)==="on")e[k.toLowerCase()]=a[k];
    else if(k==="draggable")e.draggable=a[k];
    else e.setAttribute(k,a[k]);}
  ch.flat().forEach(c=>{if(c==null||c===false)return;e.appendChild(typeof c==="object"?c:document.createTextNode(String(c)));});
  return e;}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1400);}

  bar.classList.add("show");

}

/* ---------- modal dialogs (replace native prompt/confirm) ---------- */
function openModal(opts){
  return new Promise(resolve=>{
    const overlay=h("div",{class:"modal-overlay"});
    const box=h("div",{class:"modal"});
    if(opts.title)box.appendChild(h("div",{class:"modal-title",text:opts.title}));
    if(opts.message)box.appendChild(h("div",{class:"modal-msg",text:opts.message}));
    let input=null;
    if(opts.input){input=h("input",{class:"modal-input",placeholder:opts.placeholder||""});input.value=opts.value||"";box.appendChild(input);}
    if(opts.emojis&&input){
      const grid=h("div",{class:"emoji-grid"});
      opts.emojis.forEach(em=>{const b=h("button",{class:"emoji-btn",text:em});b.onclick=()=>{input.value=em;[...grid.children].forEach(x=>x.classList.remove("sel"));b.classList.add("sel");};grid.appendChild(b);});
      box.insertBefore(grid,input);
    }
    const cancelBtn=h("button",{class:"modal-btn btn-secondary",text:opts.cancelText||"Cancel"});
    const okBtn=h("button",{class:"modal-btn "+(opts.danger?"btn-danger":"btn-primary"),text:opts.confirmText||"OK"});
    box.appendChild(h("div",{class:"modal-actions"},cancelBtn,okBtn));
    overlay.appendChild(box);document.body.appendChild(overlay);
    requestAnimationFrame(()=>overlay.classList.add("show"));
    function done(r){overlay.classList.remove("show");setTimeout(()=>overlay.remove(),170);document.removeEventListener("keydown",onKey);resolve(r);}
    function cancel(){done(opts.input?null:false);}
    function ok(){done(opts.input?input.value:true);}
    function onKey(e){if(e.key==="Escape"){e.preventDefault();cancel();}else if(e.key==="Enter"){e.preventDefault();ok();}}
    okBtn.onclick=ok;cancelBtn.onclick=cancel;
    overlay.onclick=e=>{if(e.target===overlay)cancel();};
    document.addEventListener("keydown",onKey);
    setTimeout(()=>{(input||okBtn).focus();if(input)input.select();},40);
  });
}

/* ---------- highlight matched terms ---------- */
function highlighted(text,terms){
  if(!terms||!terms.length)return document.createTextNode(text);
  const frag=document.createDocumentFragment();
  const re=new RegExp("("+terms.map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")).join("|")+")","ig");
  let last=0,m;
  while((m=re.exec(text))){
    if(m.index>last)frag.appendChild(document.createTextNode(text.slice(last,m.index)));
    frag.appendChild(h("mark",{text:m[0]}));
    last=m.index+m[0].length;
    if(re.lastIndex===m.index)re.lastIndex++;
  }
  if(last<text.length)frag.appendChild(document.createTextNode(text.slice(last)));
  return frag;
}

async function deleteLine(id){const info=idx[id];if(!info)return;if(!(await uiConfirm({title:"Delete this line?",message:"“"+info.line.text.slice(0,90)+(info.line.text.length>90?"…":"")+"”",confirmText:"Delete",danger:true})))return;

  if(showingFav){renderSaved(content);return;}
  const cat=catById(current);if(!cat){content.appendChild(h("div",{class:"empty",text:"Pick a tab on the left."}));return;}
  content.appendChild(h("h2",{class:"chead"},h("span",{text:cat.emoji+" "+cat.title}),
    h("span",{class:"catctrl"},
      h("span",{class:"minibtn",text:"rename",onClick:()=>renameCat(cat)}),
      h("span",{class:"minibtn",text:"emoji",onClick:()=>setEmoji(cat)}),
      h("span",{class:"minibtn",text:"+ section",onClick:()=>addSub(cat.id)}),
      h("span",{class:"minibtn danger",text:"delete category",onClick:()=>deleteCat(cat)}))));
  if(cat.id==="buytime")content.appendChild(h("div",{class:"hint",text:"💡 Also in the amber bar up top — one tap away at any moment."}));
  if(cat.id==="anyelse")content.appendChild(h("div",{class:"hint",text:"💡 Also in the top bar under 'Anything else?'. Ask at every natural pause."}));
  cat.subs.forEach(sub=>{
    content.appendChild(h("div",{class:"subhead",style:toneColor(sub.tone)?("--tone:"+toneColor(sub.tone)):""},
      h("span",{class:"dot"}), h("span",{text:sub.title}),
      h("span",{class:"sctrl"},
        h("span",{class:"minibtn",text:"tone",title:"Cycle colour",onClick:()=>cycleTone(sub)}),
        h("span",{class:"minibtn",text:"rename",onClick:()=>renameSub(sub)}),
        h("span",{class:"minibtn danger",text:"delete",onClick:()=>deleteSub(cat,sub)}))));
    sub.lines.forEach(line=>content.appendChild(lineCard(cat,sub,line)));
    content.appendChild(h("div",{class:"addline",text:"+ add line",onClick:()=>addLine(sub.id)}));
  });
  content.appendChild(h("div",{class:"addsub",text:"+ add section",onClick:()=>addSub(cat.id)}));
  if(pendingHighlight){const el=document.querySelector('.card[data-id="'+pendingHighlight+'"]');if(el){el.scrollIntoView({behavior:"smooth",block:"center"});el.classList.add("card");el.style.boxShadow="0 0 0 3px rgba(99,91,255,.35)";setTimeout(()=>{el.style.boxShadow="";},1600);}pendingHighlight=null;}
}

function renderSearch(content,q){
  const terms=q.split(/\s+/).filter(Boolean);
  content.appendChild(h("h2",{class:"chead"},h("span",{text:"Search"})));
  content.appendChild(h("div",{class:"hint",text:"💡 Matches every word you type. Click a result to jump to its tab."}));
  let n=0;
  model.cats.forEach(cat=>cat.subs.forEach(sub=>sub.lines.forEach(line=>{
    const hay=(line.text+" "+line.tag+" "+cat.title+" "+sub.title).toLowerCase();
    if(terms.every(t=>hay.includes(t))){
      n++;
      const card=h("div",{class:"card",data:{id:line.id},style:toneColor(sub.tone)?("--tone:"+toneColor(sub.tone)):"",onClick:()=>jumpTo(cat.id,line.id)});
      card.appendChild(h("div",{class:"crumb",text:cat.emoji+" "+cat.title+"  ›  "+sub.title}));
      const ln=h("div",{class:"line"});ln.appendChild(highlighted(line.text,terms));card.appendChild(ln);
      if(line.tag)card.appendChild(h("span",{class:"tag",text:line.tag}));
      card.appendChild(h("div",{class:"actions"},
        h("span",{class:"act go",text:"Go to ↗",onClick:e=>{e.stopPropagation();jumpTo(cat.id,line.id);}}),
        h("span",{class:"act copy",text:"Copy",onClick:e=>{e.stopPropagation();copy(line.text);}})));
      content.appendChild(card);
    }
  })));
  if(!n)content.appendChild(h("div",{class:"empty",html:"No lines matched.<br>Try fewer or simpler words — e.g. “angry”, “verify”, “hold”, “ticket”."}));
}
function jumpTo(catId,lineId){showingFav=false;document.getElementById("search").value="";current=catId;pendingHighlight=lineId;persistView();renderNav();render();}

function renderSaved(content){
  content.appendChild(h("h2",{class:"chead"},h("span",{text:"★ Saved lines"})));
  const bar=h("div",{class:"savedbar"});
  bar.appendChild(h("div",{class:"hint",style:"flex:1;margin:0"},"💡 Drag the ⠿ handle to reorder. Tap a card's ★ to remove it from this list."));
  if(model.saved.length)bar.appendChild(h("button",{class:"minibtn danger",text:"Clear all saved",onClick:async()=>{if(await uiConfirm({title:"Clear all saved lines?",message:"This removes all "+model.saved.length+" saved lines. Your library stays untouched.",confirmText:"Clear all",danger:true})){const prevSaved=model.saved.slice();model.saved=[];persist();render();showUndo("Saved list cleared",()=>{model.saved=prevSaved.slice();persist();render();});}}}));
  content.appendChild(bar);
  if(!model.saved.length){content.appendChild(h("div",{class:"empty",html:"No saved lines yet.<br>Tap the ★ on any phrase to pin it here."}));return;}
  model.saved.forEach(id=>{
    const info=idx[id];if(!info)return;
    const card=h("div",{class:"card sv",data:{id:id},draggable:true,style:toneColor(info.sub.tone)?("--tone:"+toneColor(info.sub.tone)):""});
    card.appendChild(h("div",{class:"grip",text:"⠿",title:"Drag to reorder"}));
    card.appendChild(h("div",{class:"crumb clickable",text:info.cat.emoji+" "+info.cat.title+"  ›  "+info.sub.title,onClick:()=>jumpTo(info.cat.id,id)}));
    card.appendChild(h("div",{class:"line",text:info.line.text}));
    const svStar=h("span",{class:"star on",text:"★",title:"Remove from Saved",onClick:e=>{e.stopPropagation();removeSavedAnimated(card,id,svStar);}});
    card.appendChild(svStar);
    card.appendChild(h("div",{class:"actions"},
      h("span",{class:"act copy",text:"Copy",onClick:e=>{e.stopPropagation();copy(info.line.text);}})));
    card.ondragstart=e=>{dragEl=card;setTimeout(()=>card.classList.add("dragging"),0);if(e.dataTransfer){e.dataTransfer.effectAllowed="move";try{e.dataTransfer.setData("text/plain",id);}catch(_){}}};
    card.ondragend=()=>{if(dragEl)dragEl.classList.remove("dragging");dragEl=null;commitSaved();render();};
    card.ondragover=e=>{e.preventDefault();if(!dragEl||dragEl===card)return;const r=card.getBoundingClientRect();const after=(e.clientY-r.top)>r.height/2;const ref=after?card.nextElementSibling:card;if(ref===dragEl||dragEl.nextElementSibling===ref)return;flipMove(content,()=>content.insertBefore(dragEl,ref));};
    card.ondrop=e=>{e.preventDefault();};
    content.appendChild(card);
  });
}

/* ============================================================ 7. BACKUP & ABOUT ============================================================ */
/** Downloads the entire model as a dated JSON backup file. */
function exportData(){
  const blob=new Blob([JSON.stringify(model,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=h("a",{href:url,download:"rac-backup-"+new Date().toISOString().slice(0,10)+".json"});
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast("Backup downloaded");
}
/** Restores a backup file (validated first), replacing the current setup after confirmation. */
function importData(){
  const inp=h("input",{type:"file",accept:".json,application/json"});
  inp.onchange=async()=>{
    const f=inp.files&&inp.files[0];if(!f)return;
    let m=null;try{m=JSON.parse(await f.text());}catch(e){}
    if(!m||m.v!==5||!Array.isArray(m.cats)){toast("Not a valid RAC backup file");return;}
    if(!(await uiConfirm({title:"Import backup?",message:"This replaces your current setup with the backup file. Your current data will be overwritten.",confirmText:"Import",danger:true})))return;
    model=m;runMigrations(model);persist();
    current=(model.current&&model.cats.some(c=>c.id===model.current))?model.current:"reach";
    showingFav=!!model.fav;
    buildIndex();renderNav();renderChips();render();applyTheme(model.theme||"dark");
    toast("Backup imported");
  };
  inp.click();
}
/** Small About dialog: app info + creator credit (opened from the © line in the sidebar). */
function showAbout(){
  const overlay=h("div",{class:"modal-overlay"});
  const box=h("div",{class:"modal"});
  box.appendChild(h("div",{class:"modal-title",text:"RAC — Rapid Assist Console"}));
  const rows=h("div",{class:"about-rows"});
  rows.appendChild(h("div",{},"Version "+APP_VERSION));
  rows.appendChild(h("div",{},"Built by "+AUTHOR.name+" · Fraud & Risk Specialist"));
  rows.appendChild(h("div",{},h("a",{href:AUTHOR.linkedin,target:"_blank",rel:"noopener noreferrer",text:AUTHOR.linkedin})));
  rows.appendChild(h("div",{},h("a",{href:"mailto:"+AUTHOR.email,text:AUTHOR.email})));
  box.appendChild(rows);
  const close=h("button",{class:"modal-btn btn-primary",text:"Close"});
  box.appendChild(h("div",{class:"modal-actions"},close));
  overlay.appendChild(box);document.body.appendChild(overlay);
  requestAnimationFrame(()=>overlay.classList.add("show"));
  function done(){overlay.classList.remove("show");setTimeout(()=>overlay.remove(),170);document.removeEventListener("keydown",onKey);}
  function onKey(e){if(e.key==="Escape"||e.key==="Enter"){e.preventDefault();done();}}
  close.onclick=done;overlay.onclick=e=>{if(e.target===overlay)done();};
  document.addEventListener("keydown",onKey);
}

/* ============================================================ 8. CONTROLS ============================================================ */
document.getElementById("search").addEventListener("input",render);
document.getElementById("favBtn").onclick=()=>{showingFav=true;document.getElementById("search").value="";persistView();render();const cc=document.getElementById("content");if(cc)cc.scrollTop=0;document.querySelectorAll(".cat").forEach(c=>c.classList.remove("active"));};
const brandEl=document.querySelector(".brand");
if(brandEl){brandEl.onclick=()=>{showingFav=false;current="reach";document.getElementById("search").value="";persistView();renderNav();render();const c=document.getElementById("content");if(c)c.scrollTop=0;nav.scrollTop=0;};}
const themeBtn=document.getElementById("themeBtn");
function applyTheme(t){document.documentElement.setAttribute("data-theme",t);themeBtn.textContent=t==="light"?"☾":"☀";model.theme=t;persist();}
themeBtn.onclick=()=>applyTheme(document.documentElement.getAttribute("data-theme")==="light"?"dark":"light");
applyTheme(model.theme||"dark");
document.getElementById("exportBtn").onclick=exportData;
document.getElementById("importBtn").onclick=importData;
document.addEventListener("keydown",e=>{if(e.key==="/"&&document.activeElement.id!=="search"&&!document.querySelector(".modal-overlay")){e.preventDefault();document.getElementById("search").focus();}});

/* resizable sidebar (Notion-style) */
(function(){
  const resizer=document.getElementById("resizer"), navEl=document.getElementById("nav");
  if(!resizer||!navEl)return;
  let resizing=false;
  function applyNavWidth(){ if(window.innerWidth>720 && model.navWidth){navEl.style.width=model.navWidth+"px";} else {navEl.style.width="";} }
  resizer.addEventListener("pointerdown",e=>{if(window.innerWidth<=720)return;resizing=true;resizer.classList.add("dragging");try{resizer.setPointerCapture(e.pointerId);}catch(_){}document.body.style.userSelect="none";e.preventDefault();});
  resizer.addEventListener("pointermove",e=>{if(!resizing)return;const rect=navEl.getBoundingClientRect();const maxW=Math.min(480,Math.floor(window.innerWidth*0.55));const w=Math.max(170,Math.min(maxW,Math.round(e.clientX-rect.left)));navEl.style.width=w+"px";});
  function endResize(){if(!resizing)return;resizing=false;resizer.classList.remove("dragging");document.body.style.userSelect="";const w=parseInt(navEl.style.width);if(w){model.navWidth=w;persist();}}
  resizer.addEventListener("pointerup",endResize);
  resizer.addEventListener("pointercancel",endResize);
  window.addEventListener("resize",applyNavWidth);
  applyNavWidth();
})();

/* ============================================================ 9. INIT ============================================================ */
buildIndex();renderNav();renderChips();render();
if(storage._mem)setTimeout(()=>toast("Private mode: changes won't persist after this tab closes"),700);
</script>
